<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Youbeshop Styling Game v2.3 - Sparkle Edition</title>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        :root {
            --main-bg: #f0f2f5;
            --accent: #ff4757;
            --sparkle-color: #fff200; /* 반짝이는 노란색 */
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--main-bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px;
            margin: 0;
        }

        #game-container {
            display: flex;
            background: white;
            padding: 20px;
            border-radius: 24px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
            gap: 20px;
        }

        /* 캔버스 영역 */
        #canvas-wrapper {
            position: relative;
            width: 450px;
            height: 600px;
            background: #ffffff;
            border: 2px solid #eee;
            border-radius: 15px;
            overflow: hidden;
        }

        #item-layer {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0; left: 0;
        }

        /* ✨ 반짝임 & 색상 변화 애니메이션 정의 */
        @keyframes sparkle-drop {
            0% {
                transform: scale(0.5);
                filter: brightness(3) sepia(1) hue-rotate(50deg); /* 밝게 빛나고 색상 변함 */
                box-shadow: 0 0 50px var(--sparkle-color);
                opacity: 0;
            }
            50% {
                transform: scale(1.1);
                filter: brightness(1.5) sepia(0.5);
                box-shadow: 0 0 30px var(--accent);
                opacity: 1;
            }
            100% {
                transform: scale(1);
                filter: brightness(1) sepia(0);
                box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            }
        }

        /* 추가될 아이템에 애니메이션 적용 */
        .placed-item {
            position: absolute;
            cursor: move;
            transform-origin: center;
            animation: sparkle-drop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            user-drag: none;
        }

        /* 나머지 스타일링 (이전 버전과 동일) */
        #controller { width: 320px; display: flex; flex-direction: column; }
        .item-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; max-height: 400px; overflow-y: auto; }
        .inventory-item { width: 100%; border-radius: 10px; cursor: pointer; border: 1px solid #eee; transition: 0.2s; }
        .btn { padding: 15px; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; margin-top: 10px; }
        .btn-save { background: var(--accent); color: white; }
    </style>
</head>
<body>

    <div class="title" style="font-size: 28px; font-weight: 900; margin-bottom: 20px;">Youbeshop Styling v2.3 ✨</div>

    <div id="game-container">
        <div id="canvas-wrapper">
            <div id="item-layer"></div>
        </div>

        <div id="controller">
            <div style="font-weight: 700; margin-bottom: 10px;">👕 CLOSET</div>
            <div class="item-grid">
                <img src="https://image.styleceo.co.kr/product/BC068/BC068_01.jpg" class="inventory-item" onclick="spawn(this.src)">
                <img src="https://image.styleceo.co.kr/product/BC369/BC369_01.jpg" class="inventory-item" onclick="spawn(this.src)">
                <img src="https://image.styleceo.co.kr/product/NU314/NU314_01.jpg" class="inventory-item" onclick="spawn(this.src)">
                <img src="https://image.styleceo.co.kr/product/AB155/AB155_01.jpg" class="inventory-item" onclick="spawn(this.src)">
            </div>
            
            <div style="font-size: 12px; color: #888; margin-top: 15px; background: #f8f9fa; padding: 10px; border-radius: 8px;">
                💡 아이템을 누르면 <b>반짝</b>하며 나타납니다!<br>
                💡 <b>Shift + 휠</b>로 회전도 가능해요.
            </div>

            <button class="btn btn-save" onclick="saveAsImage()">SAVE LOOK</button>
        </div>
    </div>

    <script>
        const itemLayer = document.getElementById('item-layer');
        let zIndexCounter = 100;

        function spawn(src) {
            const img = document.createElement('img');
            img.src = src;
            img.className = 'placed-item';
            img.style.width = '200px';
            img.style.left = '125px';
            img.style.top = '150px';
            img.dataset.rotation = 0;
            img.style.zIndex = ++zIndexCounter;

            img.onmousedown = startDrag;
            img.ondblclick = () => img.remove();
            
            // 휠 이벤트 (회전/사이즈)
            img.onwheel = (e) => {
                e.preventDefault();
                if (e.shiftKey) {
                    let rotation = parseInt(img.dataset.rotation);
                    rotation += (e.deltaY < 0) ? 10 : -10;
                    img.dataset.rotation = rotation;
                    img.style.transform = `rotate(${rotation}deg)`;
                } else {
                    let width = parseInt(img.style.width);
                    width += (e.deltaY < 0) ? 10 : -10;
                    img.style.width = Math.max(30, width) + 'px';
                }
            };

            itemLayer.appendChild(img);
        }

        function startDrag(e) {
            const el = e.target;
            el.style.zIndex = ++zIndexCounter;
            const rect = el.getBoundingClientRect();
            const canvasRect = itemLayer.getBoundingClientRect();
            let shiftX = e.clientX - rect.left;
            let shiftY = e.clientY - rect.top;

            function moveAt(pageX, pageY) {
                el.style.left = (pageX - canvasRect.left - shiftX) + 'px';
                el.style.top = (pageY - canvasRect.top - shiftY) + 'px';
            }

            function onMouseMove(e) { moveAt(e.clientX, e.clientY); }
            document.addEventListener('mousemove', onMouseMove);
            document.onmouseup = () => {
                document.removeEventListener('mousemove', onMouseMove);
                document.onmouseup = null;
            };
            e.preventDefault();
        }

        function saveAsImage() {
            html2canvas(document.getElementById('canvas-wrapper'), { useCORS: true }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'yoube-style.png';
                link.href = canvas.toDataURL();
                link.click();
            });
        }
    </script>
</body>
</html>
